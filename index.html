<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="imgs/favicom.jpeg">
    
  </head>
  <body>
    <main>
    <header>
      <img src="imgs/logo.png" alt="logo">
      <h1>Pesquisa</h1>
    </header>
    <section>
      <form action="" method="get">
        <fieldset>
            <legend>DadosPessoais</legend>
        <label for="name">Nome</label>
        <input type="text" id="name" placeholder="insira seu nome" required />
        <br>
        <label for="age">Idade</label>
        <input type="number" id="age" min="12" max="100" placeholder="12-100" required>
        <br>
        <label for="birthDate">Data de nascimento</label>
        <input type="date" id="birthDate">
        <br>
        <label for="email">email</label>
        <input type="email" id="email" required>
        <br>
        <label for="userPhone">Telefone</label>
        <input type="tel" id="userPhone" pattern="[0-9]{11}" placeholder="DDD+numero">
        <br>
        <label for="img">Upload de foto</label>
        <input type="file" id="img" accept="image/*">
        <br></fieldset>
        
        <fieldset>
          <legend>Perfil</legend>
          <p>Genero</p>
          <input type="radio" id="mas" name="Usergender" value="Masculino">
          <label for="mas">Masculino</label>
          <input type="radio" id="fem" name="Usergender" value="Feminino">
          <label for="fem">Feminino</label>
          <input type="radio" id="pni" name="Usergender" value="notinformed">
          <label for="pni">Prefiro nao informar</label>
          <br>
          <label for="ms">Estado civil</label>
           <select id="ms" name="MaritalStatus">
            <option value="notinformed">Selecione...</option>
            <option value="Casado">Casado</option>
            <option value="Solteiro">Solteiro</option>
            <option value="Divorciado">Divorciado(a)</option>
            <option value="Uniaoestavel">União estavel</option>
           </select>
           <br>
             <Label for="Estate">Estado</Label>
             <select id="Estate" name="Estate">
                <option value="Estate">Acre</option>
                <option value="Estate">Alagoas</option>
                <option value="Estate">Amapá</option>
                <option value="Estate">Amazonas</option>
                <option value="Estate">Bahia</option>
                <option value="Estate">Ceará</option>
                <option value="Estate">Distrito Federal</option>
                <option value="Estate">Espirito Santo</option>
                <option value="Estate">Goiás</option>
                <option value="Estate">Maranhão</option>
                <option value="Estate">Mato Grosso do Sul</option>
                <option value="Estate">Mato Grosso</option>
                <option value="Estate">Minas Gerais</option>
                <option value="Estate">Pará</option>
                <option value="Estate">Paraíba</option>
                <option value="Estate">Paraná</option>
                <option value="Estate">Pernambuco</option>
                <option value="Estate">Piauí</option>
                <option value="Estate">Rio de Janeiro</option>
                <option value="Estate">Rio Grande do Norte</option>
                <option value="Estate">Rio Grande do Sul</option>
                <option value="Estate">Rondônia</option>
                <option value="Estate">Roraima</option>
                <option value="Estate">Santa Catarina</option>
                <option value="Estate">São Paulo</option>
                <option value="Estate">Sergipe</option>
                <option value="Estate">Tocantins</option>
             </select>
             <br>
             <label for="City">Cidade:</label>
            <input id="City" type="text" id="userCity" name="userCity" autocomplete="address-level2" placeholder="Ex.: Fortaleza" />
        </fieldset>
           
        <fieldset>
           <legend>Gostos pessoais</legend>
           <p>Redes Sociais</p>
           <input id="instagram" type="checkbox" name="social" value="instagram">
           <label for="instagram">instagram</label>
           <br>
           <input id="Facebook" type="checkbox" name="social" value="Facebook">
           <label for="Facebook">Facebook</label>
           <br>
           <input id="Linkedin" type="checkbox" name="social" value="Linkedin">
           <label for="Linkedin">Linkedin</label>
            <br>
            <input id="X" type="checkbox" name="social" value="X">
           <label for="X">X</label>
           <br>
           <label for="musicStyle">Estilo musical</label>
           <input list="styleTypes"id="musicStyle" type="text">
           <datalist id="styleTypes">
            <option value="Rock">
            <option value="Samba">
            <option value="Funk">
            <option value="Sertanejo">
           </datalist>
           <br>
           <label for="color">Cor favorita</label>
           <input type="color" id="color">
        </fieldset>
         <fieldset>
            <p>voce gostou do formulario?</p>
        <label for="Ruim">Ruim</label>
        <input type="radio" name="escalasatifaçao" id="Ruim" value="Ruim">
            <label for="Otima">Otima</label>
        <input type="radio" name="escalasatifaçao" id="Otima" value="Otima">
        <label for="Excelente">Excelente</label>
        <input type="radio" name="escalasatifaçao" id="Excelente" value="Excelente"><br>
        <label for="comment">Comente algo</label>
        <textarea name="comment" id="comment" placeholder="escreva aqui..."></textarea>
        </fieldset>
        <fieldset>
            <legend>Confirmaçoes</legend>
            <input type="checkbox" name="confirmaçao" id="aceito" value="aceito" required>
            <label for="aceito">Aceito participar</label><br>
            <input type="checkbox" name="confirmaçaoemail" id="aceitoemail" value="aceito">
            <label for="aceitoemail">Aceito receber email</label>
        </fieldset>
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
        
      </form>
    </section>
    </main>
  </body>
</html>
